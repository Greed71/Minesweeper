spring.application.name=minesweeper

# In locale (npm run dev) basta niente: default H2 in memoria, compatibile con SQL tipo Postgres.
# In produzione: imposta SPRING_DATASOURCE_URL (jdbc:postgresql:...), USERNAME, PASSWORD.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:minesweeper;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Siti da cui il browser può chiamare l'API (un URL o più URL separati da virgola)
app.cors.allowed-origins=${FRONT:http://localhost:5173}
# Chiave HMAC per i JWT: almeno 32 caratteri; in produzione usare un segreto unico
app.jwt.secret=${JWT_SECRET:change-me-in-production-use-openssl-rand-hex-32}
app.jwt.issuer=${JWT_ISSUER:minesweeper-api}
app.jwt.audience=${JWT_AUDIENCE:minesweeper-app}
# Access token: 15 minuti (900 secondi). Refresh token: 7 giorni.
app.jwt.ttl-seconds=${JWT_TTL_SECONDS:900}
app.jwt.refresh-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:604800}

server.port=${PORT:8080}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Rate limit dedicato per GET /api/ping (keep-alive): più generoso degli endpoint auth/game
app.security.ping-rate-max-per-minute=120
app.security.ping-rate-window-seconds=60

# Partite in memoria: dopo questo tempo la sessione viene rimossa
app.game.session-ttl-seconds=3600
# Dopo quanto (ms) parte il primo giro e ogni quanto controlla le partite ferme
app.game.session-cleanup-initial-delay-ms=60000
app.game.session-cleanup-interval-ms=300000

# Documentazione: Swagger UI sotto /swagger-ui.html
