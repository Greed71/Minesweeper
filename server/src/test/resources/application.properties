spring.datasource.url=jdbc:h2:mem:minesweeper;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

app.game.session-cleanup-initial-delay-ms=3600000
app.game.session-cleanup-interval-ms=3600000

app.jwt.secret=test-jwt-secret-must-be-long-enough-for-hmac-256-ok
app.jwt.issuer=minesweeper-api
app.jwt.audience=minesweeper-app
app.jwt.ttl-seconds=3600
app.cors.allowed-origins=http://localhost:5173
app.security.auth-rate-max-per-minute=1000

server.port=0
